name: Build & Publish Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'

      - name: Install dependencies
        run: cd extension && npm install

      - name: Build (Chrome)
        run: cd extension && node build.js chrome

      - name: Set version in Chrome manifest
        if: github.event_name == 'push'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' extension/dist/manifest.json > tmp.json
          mv tmp.json extension/dist/manifest.json

      - name: Zip Chrome dist
        run: (cd extension/dist && zip -r ../../chrome.zip .)

      - name: Build (Firefox)
        run: cd extension && node build.js firefox

      - name: Set version in Firefox manifest
        if: github.event_name == 'push'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' extension/dist/manifest.json > tmp.json
          mv tmp.json extension/dist/manifest.json

      - name: Zip Firefox dist
        run: (cd extension/dist && zip -r ../../firefox.zip .)

      # Publish on tag push only

      - name: Publish to Web Store (Chrome)
        if: github.event_name == 'push'
        uses: maoserr/chrome_extension_publish@v1.0.3
        with:
          chrome_extension_id: ${{ secrets.CHROME_EXTENSION_ID }}
          client_id: ${{ secrets.CHROME_CLIENT_ID }}
          refresh_token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          client_secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          file: chrome.zip

      - name: Zip source (Firefox)
        run: zip -r src.zip extension -x "extension/node_modules/*" -x "extension/dist/*"

      - name: Sign & submit (FireFox)
        if: github.event_name == 'push'
        uses: maoserr/firefox_extension_publish@v1.0.4
        with:
          firefox_extension_id: ${{ secrets.FIREFOX_EXTENSION_ID }}
          api_key: ${{ secrets.FIREFOX_API_ISSUER }}
          api_secret: ${{ secrets.FIREFOX_API_SECRET }}
          file: firefox.zip
          src_file: src.zip


      - name: Create GitHub release
        if: github.event_name == 'push'
        run: |
          gh release create "$GITHUB_REF_NAME" chrome.zip firefox.zip \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
          || gh release upload "$GITHUB_REF_NAME" chrome.zip firefox.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Nightly release (dispatch only)

      - name: Delete existing nightly release
        if: github.event_name == 'workflow_dispatch'
        run: gh release delete nightly --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload nightly release
        if: github.event_name == 'workflow_dispatch'
        run: |
          gh release create nightly chrome.zip firefox.zip \
            --title "Nightly" \
            --notes "Latest build from commit ${{ github.sha }}" \
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
